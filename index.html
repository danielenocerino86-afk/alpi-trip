<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="D&A Trip">
<meta name="theme-color" content="#2D6A4F">
<meta name="description" content="Segui il viaggio di Daniele e Angela: Abruzzo, Trentino e Umbria!">
<meta property="og:title" content="Daniele & Angela — Abruzzo, Trentino & Umbria">
<meta property="og:description" content="Segui il nostro road trip in tempo reale! 8 giorni, 10-17 agosto 2026.">
<title>Daniele & Angela — Viaggio 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26F0;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#F5F2EB}
body{font-family:'DM Sans',system-ui,sans-serif;color:#3C3226;min-height:100dvh;overflow-x:hidden;background:#F5F2EB}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#C4B99A;border-radius:3px}

/* ===== MOBILE LAYOUT (default) ===== */
#layout{display:block;max-width:480px;margin:0 auto}

/* Hero */
.hero{background:linear-gradient(135deg,#2D6A4F 0%,#40916C 60%,#52B788 100%);padding:max(env(safe-area-inset-top),16px) 20px 28px;color:#fff;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:40px;background:#F5F2EB;border-radius:50% 50% 0 0}
.hero-inner{position:relative;z-index:1}
.hero .tag{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:#B7E4C7;margin-bottom:5px}
.hero h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;line-height:1.1;margin-bottom:3px}
.hero .names{font-size:13px;font-weight:600;color:#D8F3DC}
.hero .sub{font-size:11px;color:#B7E4C7;margin:4px 0 16px}
.countdown{background:rgba(255,255,255,.15);border-radius:14px;padding:11px 16px;margin-bottom:14px;display:inline-block}
.countdown-num{font-size:24px;font-weight:700}
.countdown-label{font-size:10px;color:#B7E4C7;text-transform:uppercase;letter-spacing:1px}
.countdown-units{display:flex;gap:14px;justify-content:center}
.countdown-unit{text-align:center}
.stats{display:flex;align-items:center;justify-content:center;gap:14px}
.stats-ring{position:relative;width:50px;height:50px}
.stats-ring svg{transform:rotate(-90deg)}
.stats-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.pbar{height:5px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin-top:12px}
.pbar-fill{height:100%;background:#D8F3DC;border-radius:4px;transition:width .5s}
.day-dots{display:flex;justify-content:space-between;margin-top:7px}
.day-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s}
.live-badge{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:10px;color:#D8F3DC;background:rgba(255,255,255,.12);padding:4px 14px;border-radius:16px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#D8F3DC;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Tabs — mobile horizontal */
.tabs{display:flex;background:#fff;border-bottom:.5px solid #E8E2D4;position:sticky;top:0;z-index:1000;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:52px;padding:12px 0;border:none;background:transparent;color:#B0A48E;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;transition:all .2s;white-space:nowrap}
.tab.active{color:#2D6A4F;border-bottom-color:#2D6A4F}
.content{padding:14px 14px 100px}

/* Map */
#map-container{width:100%;height:52vh;min-height:300px;position:relative}
#map{width:100%;height:100%;border-radius:0 0 12px 12px}
.map-info{padding:14px}
.map-status{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.map-status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.map-status-title{font-size:14px;font-weight:600;color:#3C3226}
.map-status-sub{font-size:11px;color:#8B7355;margin-top:2px}
.map-next{background:#E8F5E9;border:.5px solid #C8E6C9;border-radius:12px;padding:14px;margin-top:8px;display:flex;align-items:center;gap:12px}

/* Weather */
.weather{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:13px;margin-top:8px;display:flex;align-items:center;gap:14px}
.weather-icon{font-size:30px}
.weather-temp{font-size:24px;font-weight:700;color:#3C3226}
.weather-desc{font-size:12px;color:#8B7355}
.weather-place{font-size:10px;color:#B0A48E}

/* Cards */
.card{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;margin-bottom:10px;overflow:hidden;transition:all .2s}
.card-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.card-emoji{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.card-date{font-size:10px;color:#B0A48E;margin-left:6px;font-weight:500}
.card-title{font-size:15px;font-weight:600;color:#3C3226;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.card-km{font-size:11px;color:#8B7355;margin-top:2px}
.card-prog{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.card-arrow{font-size:13px;color:#C4B99A;transition:transform .3s;flex-shrink:0}
.card-arrow.open{transform:rotate(180deg)}
.card-body{padding:0 16px 16px}

/* Stops */
.stop{margin:8px 0;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:11px;overflow:hidden}
.stop-row{display:flex;align-items:center;gap:10px;padding:12px 14px}
.chk{width:27px;height:27px;border-radius:7px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;border:2px solid #D4C9B8;background:transparent;transition:all .2s}
.chk.on{border-color:var(--c);background:var(--c)}
.chk.readonly{cursor:default;opacity:.6}
.stop-name{font-size:14px;font-weight:600;color:#3C3226}
.stop-name.done{text-decoration:line-through;color:#B0A48E}
.stop-preview{font-size:11px;color:#8B7355;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stop-maps{font-size:10px;font-weight:600;color:#2D6A4F;text-decoration:none;padding:6px 12px;border-radius:14px;border:.5px solid #2D6A4F40;white-space:nowrap;flex-shrink:0;min-height:34px;display:flex;align-items:center}
.stop-detail{padding:0 14px 12px 51px}
.stop-desc{font-size:13px;color:#6B5D4D;line-height:1.7}
.stop-tip{margin-top:8px;font-size:12px;color:#2D6A4F;background:#E8F5E9;padding:8px 12px;border-radius:8px;border-left:3px solid #2D6A4F50}
.stop-warn{margin-top:8px;font-size:12px;color:#854F0B;background:#FFF8E1;padding:8px 12px;border-radius:8px;border-left:3px solid #F9A82540}

/* Timeline */
.timeline{display:flex;gap:5px;padding:8px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.timeline::-webkit-scrollbar{display:none}
.tl-item{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:58px;padding:7px 5px;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:9px;font-size:10px;color:#8B7355;text-align:center;flex-shrink:0}
.tl-time{font-weight:700;color:#2D6A4F;font-size:11px}
.tl-name{font-size:9px;color:#6B5D4D;line-height:1.3}

/* Info row */
.info-row{display:flex;gap:8px;margin-top:12px}
.info-box{flex:1;border-radius:9px;padding:9px 12px}
.info-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.info-val{font-size:12px;line-height:1.6;margin-top:3px}
.special-route{display:block;margin-top:12px;padding:12px;border-radius:10px;text-decoration:none;text-align:center;font-size:13px;font-weight:600}

/* Diary */
.diary-entry{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:16px;margin-bottom:12px}
.diary-date{font-size:11px;color:#2D6A4F;font-weight:600;margin-bottom:5px}
.diary-text{font-size:14px;color:#3C3226;line-height:1.75}
.diary-add{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:16px;margin-bottom:16px}
.diary-textarea{width:100%;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:10px;padding:12px;color:#3C3226;font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:90px}
.diary-textarea:focus{border-color:#2D6A4F}
.diary-textarea::placeholder{color:#C4B99A}

/* Routes */
.route-card{display:flex;align-items:center;gap:14px;padding:16px;margin-bottom:10px;border-radius:12px;text-decoration:none;background:#fff;border:.5px solid #E8E2D4}
.route-icon{font-size:24px;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.route-label{font-size:15px;font-weight:600;color:#3C3226}
.route-sub{font-size:12px;color:#8B7355;margin-top:2px}
.pins-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pin-chip{display:inline-flex;align-items:center;gap:3px;padding:7px 12px;border-radius:18px;text-decoration:none;font-size:12px;font-weight:500;background:#fff;border:.5px solid #E8E2D4;color:#6B5D4D;transition:all .2s}

/* Gallery */
.gal-btns{display:flex;gap:10px;margin-bottom:14px}
.gal-btn{flex:1;background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:16px 8px;text-align:center;cursor:pointer}
.gal-btn-icon{font-size:26px;margin-bottom:4px}
.gal-btn-text{font-size:12px;color:#2D6A4F;font-weight:600}
.gal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.gal-thumb{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;cursor:pointer;background:#E8E2D4}
.gal-thumb img{width:100%;height:100%;object-fit:cover}
.gal-thumb-day{position:absolute;top:5px;left:5px;font-size:9px;font-weight:700;background:rgba(0,0,0,.5);color:#fff;padding:2px 7px;border-radius:6px}
.gal-thumb-del{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(192,57,43,.8);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gal-preview{background:#fff;border:.5px solid #2D6A4F40;border-radius:12px;padding:16px;margin-bottom:16px}
.gal-preview img{width:100%;max-height:220px;object-fit:contain;border-radius:8px;margin-bottom:12px;background:#FAFAF6}
.gal-input{width:100%;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:10px;padding:11px 12px;color:#3C3226;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.gal-input:focus{border-color:#2D6A4F}
.gal-day-sel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.gal-day-btn{padding:6px 12px;border-radius:14px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.gal-day-btn.act{border-color:#2D6A4F;color:#2D6A4F;background:#E8F5E9}
.gal-filter{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.gal-filter::-webkit-scrollbar{display:none}
.gal-filter-btn{padding:7px 14px;border-radius:18px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.gal-filter-btn.act{border-color:#2D6A4F;color:#2D6A4F;background:#E8F5E9}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;flex-direction:column}
.lightbox img{max-width:100%;max-height:70vh;border-radius:8px;object-fit:contain}
.lightbox-caption{color:#aaa;font-size:13px;margin-top:12px;text-align:center}
.lightbox-close{position:absolute;top:max(20px,env(safe-area-inset-top));right:20px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-prev{left:10px}.lightbox-next{right:10px}

/* Admin/Private */
.sub-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:8px 14px;border-radius:18px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.sub-tab.act{border-color:#2D6A4F;color:#2D6A4F;background:#E8F5E9}
.exp-total-card{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:18px;text-align:center;margin-bottom:14px}
.exp-total-num{font-size:30px;font-weight:700;color:#3C3226}
.exp-total-sub{font-size:12px;color:#8B7355;margin-top:3px}
.exp-total-pp{font-size:15px;color:#2D6A4F;font-weight:600;margin-top:5px}
.exp-cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.exp-cat-card{background:#fff;border:.5px solid #E8E2D4;border-radius:11px;padding:12px;display:flex;align-items:center;gap:10px}
.exp-cat-icon{font-size:20px}
.exp-cat-name{font-size:11px;color:#8B7355}
.exp-cat-val{font-size:15px;font-weight:700;color:#3C3226}
.form-box{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:16px;margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:#2D6A4F;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.form-row{display:flex;gap:8px;margin-bottom:10px}
.form-input{flex:1;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:9px;padding:11px 12px;color:#3C3226;font-size:14px;font-family:inherit;outline:none;min-width:0}
.form-input:focus{border-color:#2D6A4F}
.form-input::placeholder{color:#C4B99A}
.form-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.form-cat{padding:6px 12px;border-radius:14px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.form-cat.act{border-color:var(--c);color:var(--c);background:color-mix(in srgb,var(--c) 8%,#fff)}
.form-days{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.form-day{padding:6px 11px;border-radius:12px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.form-day.act{border-color:#2D6A4F;color:#2D6A4F;background:#E8F5E9}
.btn-primary{width:100%;padding:13px;border-radius:11px;border:none;background:#2D6A4F;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary:active{opacity:.8}
.btn-secondary{padding:11px 18px;border-radius:11px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.exp-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:.5px solid #E8E2D4;border-radius:11px;margin-bottom:6px}
.exp-item-name{font-size:13px;font-weight:600;color:#3C3226;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-item-meta{font-size:10px;color:#B0A48E;margin-top:2px}
.exp-item-amount{font-size:14px;font-weight:700;color:#3C3226;flex-shrink:0}
.exp-item-del{width:26px;height:26px;border-radius:7px;border:none;background:#FEF0F0;color:#C0392B;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hotel-card{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:16px;margin-bottom:10px;position:relative}
.hotel-name{font-size:16px;font-weight:600;color:#3C3226;margin-bottom:7px}
.hotel-row{display:flex;align-items:center;gap:7px;font-size:12px;color:#6B5D4D;margin-top:5px}
.hotel-nav{display:flex;gap:7px;margin-top:12px}
.hotel-nav a{flex:1;padding:11px;border-radius:9px;text-decoration:none;text-align:center;font-size:13px;font-weight:600}
.nav-go{background:#E8F5E9;color:#2D6A4F;border:.5px solid #C8E6C9}
.nav-call{background:#FFF8E1;color:#854F0B;border:.5px solid #FFE082}
.hotel-del{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:6px;background:#FEF0F0;color:#C0392B;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hotel-day-tag{font-size:9px;font-weight:700;padding:3px 9px;border-radius:6px;display:inline-block;margin-bottom:7px}
.note-card{background:#fff;border:.5px solid #E8E2D4;border-radius:11px;padding:12px 14px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start}
.note-warn{border-left:3px solid #F9A825;background:#FFFDE7}
.note-icon{font-size:15px;flex-shrink:0;margin-top:2px}
.note-text{font-size:12px;color:#6B5D4D;line-height:1.7}
.note-text strong{color:#3C3226}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.budget-card{background:#fff;border:.5px solid #E8E2D4;border-radius:11px;padding:12px}
.budget-label{font-size:10px;font-weight:700;color:#8B7355;text-transform:uppercase;letter-spacing:1px}
.budget-val{font-size:18px;font-weight:700;color:#3C3226;margin-top:3px}
.budget-sub{font-size:10px;color:#B0A48E;margin-top:2px}
.precheck-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:.5px solid #E8E2D4;border-radius:11px;margin-bottom:6px}
.precheck-text{flex:1;font-size:13px;color:#3C3226}
.precheck-text.done{text-decoration:line-through;color:#B0A48E}

/* Floating buttons */
.fab{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:16px;width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,.14);z-index:20;font-size:16px}
.fab-admin{background:#2D6A4F;color:#fff}
.fab-login{background:#fff;color:#8B7355;border:.5px solid #E8E2D4}

/* Login popup */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.pin-box{background:#fff;border-radius:18px;padding:32px 28px;text-align:center;width:100%;max-width:320px}
.pin-box h2{font-family:'Playfair Display',serif;font-size:22px;color:#3C3226;margin-bottom:5px}
.pin-box p{font-size:12px;color:#8B7355;margin-bottom:18px}
.pin-input{width:150px;padding:12px;border-radius:11px;border:.5px solid #E8E2D4;background:#FAFAF6;color:#3C3226;font-size:20px;text-align:center;letter-spacing:10px;font-family:inherit;outline:none}
.pin-input:focus{border-color:#2D6A4F}
.pin-error{color:#C0392B;font-size:11px;margin-top:7px;min-height:16px}
.pin-cancel{margin-top:14px;background:none;border:none;color:#B0A48E;font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit}

/* Summary */

// GPS
function startGPS(){if(!navigator.geolocation)return;isTracking=true;gpsWatchId=navigator.geolocation.watchPosition(p=>{livePos={lat:p.coords.latitude,lng:p.coords.longitude};lastUpdate=Date.now();if(fbOk)db.child('position').set({lat:livePos.lat,lng:livePos.lng,ts:lastUpdate});updateMarker();render()},e=>{},{enableHighAccuracy:true,maximumAge:10000,timeout:15000});render()}
function stopGPS(){if(gpsWatchId!==null)navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;isTracking=false;render()}
function sendPos(){navigator.geolocation.getCurrentPosition(p=>{livePos={lat:p.coords.latitude,lng:p.coords.longitude};lastUpdate=Date.now();if(fbOk)db.child('position').set({lat:livePos.lat,lng:livePos.lng,ts:lastUpdate});updateMarker();render()},e=>alert("GPS: "+e.message),{enableHighAccuracy:true,timeout:10000})}

async function fetchWeather(lat,lng){
try{const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lng+'&current=temperature_2m,weather_code&timezone=Europe/Rome');
const d=await r.json();if(d.current){weather={temp:Math.round(d.current.temperature_2m),code:d.current.weather_code};render()}}catch(e){}}
function weatherIcon(c){if(c<=1)return'\u2600\uFE0F';if(c<=3)return'\u26C5';if(c<=48)return'\u{1F32B}\uFE0F';if(c<=67)return'\u{1F327}\uFE0F';if(c<=77)return'\u2744\uFE0F';return'\u26C8\uFE0F'}
function weatherDesc(c){if(c<=1)return'Sereno';if(c<=3)return'Parzialmente nuvoloso';if(c<=48)return'Nuvoloso';if(c<=67)return'Pioggia';if(c<=77)return'Neve';return'Temporale'}

// HELPERS
function ring(sz,sw,pct,col){const r=(sz-sw)/2,c=2*Math.PI*r;return'<svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg)"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="'+sw+'"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+(col||'#D8F3DC')+'" stroke-width="'+sw+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+c*(1-pct)+'" stroke-linecap="round" style="transition:stroke-dashoffset .5s"/></svg>'}
function totalDone(){return Object.values(checks).filter(Boolean).length}
function totalStops(){return DAYS.reduce((a,d)=>a+d.stops.length,0)}
function dayProg(di){const d=DAYS[di],n=d.stops.filter((_,si)=>checks[di+"-"+si]).length;return d.stops.length?n/d.stops.length:0}
function isDayDone(di){return dayProg(di)===1}
function timeSince(ts){if(!ts)return"";const s=Math.floor((Date.now()-ts)/1000);if(s<60)return"adesso";if(s<3600)return Math.floor(s/60)+" min fa";if(s<86400)return Math.floor(s/3600)+"h fa";return Math.floor(s/86400)+"g fa"}
function distKm(a,b,c,d){const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function nextStop(){for(let i=0;i<DAYS.length;i++)for(let j=0;j<DAYS[i].stops.length;j++)if(!checks[i+"-"+j])return{...DAYS[i].stops[j],di:i,si:j};return null}
function countdownText(){const now=new Date(),diff=TRIP_START-now;if(diff<=0){if(new Date()>TRIP_END)return null;return{live:true}}const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);return{d,h,m}}
function tripFinished(){return new Date()>TRIP_END}

const warn=document.getElementById('ne-warn-'+di).checked;
const stop={name,desc,tip,warn,map:'https://maps.google.com/?q='+encodeURIComponent(name)};
if(latV)stop.lat=parseFloat(latV);
if(lngV)stop.lng=parseFloat(lngV);
DAYS[di].stops.push(stop);
editingStop=null;saveDays();render();
}
function delStop(di,si){
const s=DAYS[di].stops[si];
if(!confirm('Eliminare la tappa "'+s.name+'"?'))return;
DAYS[di].stops.splice(si,1);
const nc={};
Object.keys(checks).forEach(k=>{
const p=k.split('-'),d=parseInt(p[0]),ss=parseInt(p[1]);
if(d===di){if(ss<si)nc[k]=checks[k];else if(ss>si)nc[d+'-'+(ss-1)]=checks[k]}
else nc[k]=checks[k];
});
checks=nc;
editingStop=null;saveDays();saveChk();render();
}
function resetDays(){
if(!confirm('Ripristinare le tappe originali? Perderai tutte le modifiche.'))return;
DAYS=JSON.parse(JSON.stringify(DEFAULT_DAYS));
checks={};editingStop=null;
saveDays();saveChk();render();
}
function prepPhoto(f){if(!f)return;pendingFile=f;pendingCaption="";pendingDay=1;for(let i=DAYS.length-1;i>=0;i--)for(let j=DAYS[i].stops.length-1;j>=0;j--)if(checks[i+"-"+j]){pendingDay=DAYS[i].day;i=-1;break}
const r=new FileReader();r.onload=e=>{pendingPreview=e.target.result;render()};r.readAsDataURL(f)}
function cancelPhoto(){pendingFile=null;pendingPreview=null;render()}
async function confirmPhoto(){if(!pendingFile||uploading)return;const c=document.getElementById('photo-caption');if(c)pendingCaption=c.value;uploading=true;render();
try{const rs=await resizeImg(pendingFile,1200);const fd=new FormData();fd.append('image',rs);
const r=await fetch('https://api.imgur.com/3/image',{method:'POST',headers:{'Authorization':'Client-ID '+IMGUR_CID},body:fd});
const d=await r.json();if(d.success){const p={id:'p'+Date.now(),url:d.data.link,thumb:d.data.link.replace(/(\.[a-z]+)$/i,'m$1'),day:pendingDay,caption:pendingCaption.trim(),ts:Date.now()};
if(fbOk)await db.child('photos/'+p.id).set(p);photos.unshift(p)}}catch(e){alert('Errore: '+e.message)}
uploading=false;pendingFile=null;pendingPreview=null;render()}
function resizeImg(f,mx){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const i=new Image();i.onload=()=>{let w=i.width,h=i.height;if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx}else{w=Math.round(w*mx/h);h=mx}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);c.toBlob(r,'image/jpeg',.82)};i.src=e.target.result};rd.readAsDataURL(f)})}
function delPhoto(id){if(!confirm('Eliminare?'))return;if(fbOk)db.child('photos/'+id).remove();photos=photos.filter(p=>p.id!==id);render()}

// Resize listener → re-render per passaggio mobile/desktop
let _lastDesk=window.innerWidth>=768;
window.addEventListener('resize',()=>{const d=window.innerWidth>=768;if(d!==_lastDesk){_lastDesk=d;render();if(tab==="map")setTimeout(()=>{if(leafletMap)leafletMap.invalidateSize()},300)}});

// INIT
loadAll();render();initFB();
setInterval(()=>{const cd=countdownText();if(cd&&!cd.live){const el=document.querySelector('.countdown');if(el)render()}},60000);

// Service Worker
if('serviceWorker' in navigator){
const sw=URL.createObjectURL(new Blob([`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>{
if(e.request.url.includes('api.open-meteo')||e.request.url.includes('api.imgur')||e.request.url.includes('firebase'))return;
e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
if(res.ok){const c=res.clone();caches.open('trip-v1').then(cache=>cache.put(e.request,c))}return res}).catch(()=>caches.match(e.request))))});
`],{type:'application/javascript'}));
navigator.serviceWorker.register(sw).catch(()=>{});}
</script>
