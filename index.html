function initFirebase(){
  if(!firebaseReady)return;
  dbRef.child('position').on('value',snap=>{
    const val=snap.val();
    if(val){
      livePos={lat:val.lat,lng:val.lng};lastUpdate=val.ts;
      updateMapMarker();
      // Only re-render non-map parts to avoid destroying the map
      if(tab!=="map")render();
      else{
        // Update just the info section below map
        const infoEl=document.querySelector('.map-info');
        if(infoEl)renderMapInfo(infoEl);
        // Update hero live badge
        const heroEl=document.querySelector('.live-badge');
        if(!heroEl&&livePos){render()}
      }
    }
  });
  dbRef.child('checks').on('value',snap=>{
    const val=snap.val();
    if(val&&!isAdmin){checks=val;render()}
  });
  dbRef.child('photos').on('value',snap=>{
    const val=snap.val();
    if(val){photos=Object.values(val).sort((a,b)=>b.ts-a.ts);if(tab==="gallery")render()}
    else{photos=[];if(tab==="gallery")render()}
  });
}

function renderMapInfo(container){
  const ns=nextStop();
  let h='';
  if(livePos){
    h+=`<div class="map-status"><div class="map-status-dot" style="background:#48C9B0;animation:pulse 2s infinite"></div>
    <div class="map-status-text"><div class="map-status-title">📍 Daniele & Angela sono in viaggio!</div>
    <div class="map-status-sub">Ultima posizione: ${timeSince(lastUpdate)}</div></div></div>`;
    if(ns&&ns.lat){const d=distKm(livePos.lat,livePos.lng,ns.lat,ns.lng);
    h+=`<div class="map-next"><div class="map-next-icon">${DAYS[ns.di].emoji}</div><div style="flex:1">
    <div class="map-next-label">Prossima tappa</div><div class="map-next-name">${ns.name}</div>
    <div class="map-next-dist">~${d<1?(d*1000).toFixed(0)+' m':d.toFixed(1)+' km'} in linea d'aria</div></div></div>`}
    h+=`<button class="admin-btn admin-btn-secondary" style="margin-top:8px" onclick="centerOnMe()">🎯 Centra sulla posizione</button>`;
  }else{
    h+=`<div class="map-status"><div class="map-status-dot" style="background:#556"></div>
    <div class="map-status-text"><div class="map-status-title">In attesa della posizione...</div>

  container.innerHTML=h;
}

function startTracking(){
  if(!navigator.geolocation)return;
  isTracking=true;
  gpsWatchId=navigator.geolocation.watchPosition(pos=>{
    livePos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    lastUpdate=Date.now();
    if(firebaseReady)dbRef.child('position').set({lat:livePos.lat,lng:livePos.lng,ts:lastUpdate});
    updateMapMarker();render();
  },err=>{console.warn("GPS error",err)},{enableHighAccuracy:true,maximumAge:10000,timeout:15000});
  render();
}
function stopTracking(){
  if(gpsWatchId!==null)navigator.geolocation.clearWatch(gpsWatchId);
  gpsWatchId=null;isTracking=false;render();
}
function sendPositionOnce(){
  navigator.geolocation.getCurrentPosition(pos=>{
    livePos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    lastUpdate=Date.now();
    if(firebaseReady)dbRef.child('position').set({lat:livePos.lat,lng:livePos.lng,ts:lastUpdate});
    updateMapMarker();render();
  },err=>alert("Errore GPS: "+err.message),{enableHighAccuracy:true,timeout:10000});
}

function initMap(){
  if(leafletMap){leafletMap.remove();leafletMap=null;posMarker=null;routeLine=null}
  const el=document.getElementById('map');
  if(!el)return;
  leafletMap=L.map(el,{zoomControl:false,attributionControl:false}).setView([44.5,12.0],6);
  L.control.zoom({position:'topright'}).addTo(leafletMap);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(leafletMap);
  routeLine=L.polyline(ROUTE_LINE,{color:'#2E86AB',weight:3,opacity:.4,dashArray:'8,8'}).addTo(leafletMap);
  ALL_STOPS.forEach(s=>{
    if(!s.lat)return;
    const done=!!checks[s.di+"-"+s.si];
    const icon=L.divIcon({className:'custom-marker',html:`<div class="marker-pin" style="background:${done?s.dayColor:s.dayColor+'40'};border-color:${done?'#fff':s.dayColor}">${done?'✓':s.dayNum}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
    L.marker([s.lat,s.lng],{icon}).addTo(leafletMap).bindPopup(`<b>${s.name}</b><br><span style="font-size:11px;color:#666">${s.desc.slice(0,80)}...</span><br><a href="${s.map}" target="_blank" style="font-size:11px">📍 Apri in Google Maps</a>`);
  });
  leafletMap.fitBounds(routeLine.getBounds().pad(0.1));
  setTimeout(()=>{if(leafletMap)leafletMap.invalidateSize()},200);
}
function updateMapMarker(){
  if(!leafletMap||!livePos)return;
  if(!posMarker){
    const icon=L.divIcon({className:'custom-marker',html:'<div class="marker-you"></div>',iconSize:[18,18],iconAnchor:[9,9]});
    posMarker=L.marker([livePos.lat,livePos.lng],{icon,zIndexOffset:1000}).addTo(leafletMap);
  }else{posMarker.setLatLng([livePos.lat,livePos.lng])}
}
function centerOnMe(){if(leafletMap&&livePos)leafletMap.setView([livePos.lat,livePos.lng],13,{animate:true})}

function ring(sz,sw,pct,col){const r=(sz-sw)/2,c=2*Math.PI*r;return`<svg width="${sz}" height="${sz}" class="ring" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" class="ring-bg" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" class="ring-fg" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct)}"/></svg>`}
function totalDone(){return Object.values(checks).filter(Boolean).length}
function totalStops(){return DAYS.reduce((a,d)=>a+d.stops.length,0)}
function dayProg(di){const d=DAYS[di],n=d.stops.filter((_,si)=>checks[di+"-"+si]).length;return d.stops.length?n/d.stops.length:0}
function isDayDone(di){return dayProg(di)===1}
function timeSince(ts){if(!ts)return"";const s=Math.floor((Date.now()-ts)/1000);if(s<60)return"adesso";if(s<3600)return Math.floor(s/60)+" min fa";if(s<86400)return Math.floor(s/3600)+"h fa";return Math.floor(s/86400)+"g fa"}
function distKm(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function nextStop(){for(let di=0;di<DAYS.length;di++)for(let si=0;si<DAYS[di].stops.length;si++)if(!checks[di+"-"+si])return{...DAYS[di].stops[si],di,si,dayColor:DAYS[di].color};return null}

function switchTab(t){tab=t;openDay=null;openStop=null;render();window.scrollTo(0,0)}
function toggleDay(di){openDay=openDay===di?null:di;openStop=null;render()}
function toggleStop(key){openStop=openStop===key?null:key;render()}
function toggleCheck(di,si){if(!isAdmin)return;const k=di+"-"+si;checks[k]=!checks[k];if(!checks[k])delete checks[k];saveChecks();render()}
function checkPin(val){if(val.length===4){if(val===ADMIN_PIN){isAdmin=true;showLoginPopup=false;pinError="";saveAdmin();render();initFirebase()}else{pinError="PIN errato";render();setTimeout(()=>{const el=document.getElementById('pin-input');if(el){el.value='';el.focus()}},100)}}}
function openLogin(){showLoginPopup=true;pinError="";render();setTimeout(()=>{const el=document.getElementById('pin-input');if(el)el.focus()},100)}
function closeLogin(){showLoginPopup=false;pinError="";render()}
function logout(){isAdmin=false;showLoginPopup=false;stopTracking();saveAdmin();tab="map";render()}
function setExpCat(c){expCat=c;render()}
function setExpDay(d){expDay=d;render()}
function setExpFilter(f){expFilter=f;render()}
function addExpense(){const de=document.getElementById("exp-desc"),ae=document.getElementById("exp-amount"),amt=parseFloat(ae.value);if(!amt||amt<=0){ae.focus();return}expenses.push({desc:de.value.trim()||CATS.find(c=>c.id===expCat).name,amount:amt,cat:expCat,day:expDay,ts:Date.now()});saveExpenses();expCat="food";expDay=0;render()}
function deleteExpense(i){expenses.splice(i,1);saveExpenses();render()}
function clearExpenses(){if(confirm("Cancellare tutte le spese?")){expenses=[];saveExpenses();render()}}

// Gallery functions
function setGalFilter(f){galFilter=f;render()}
function pickPhoto(){document.getElementById('photo-gallery').click()}
function openLightbox(idx){lightboxIdx=idx;render()}
function closeLightbox(){lightboxIdx=-1;render()}
function navLightbox(dir){
  lightboxIdx+=dir;
  if(lightboxIdx<0)lightboxIdx=photos.length-1;
  if(lightboxIdx>=photos.length)lightboxIdx=0;
  render();
}

function guessDay(){
  for(let di=DAYS.length-1;di>=0;di--)
    for(let si=DAYS[di].stops.length-1;si>=0;si--)
      if(checks[di+"-"+si])return DAYS[di].day;
  return 1;
}

function preparePhoto(file){
  if(!file)return;
  pendingFile=file;
  pendingCaption="";
  pendingDay=guessDay();
  const reader=new FileReader();
  reader.onload=function(e){pendingPreview=e.target.result;render()};
  reader.readAsDataURL(file);
}

function cancelPending(){
  pendingFile=null;pendingPreview=null;pendingCaption="";pendingDay=0;
  render();
}

async function confirmUpload(){
  if(!pendingFile||uploading)return;
  // Grab caption from input before render wipes it
  const capEl=document.getElementById('photo-caption');
  if(capEl)pendingCaption=capEl.value;
  uploading=true;render();
  try{
    const resized=await resizeImage(pendingFile,1200);
    const fd=new FormData();
    fd.append('image',resized);
    const resp=await fetch('https://api.imgur.com/3/image',{
      method:'POST',
      headers:{'Authorization':'Client-ID '+IMGUR_CLIENT_ID},
      body:fd
    });
    const data=await resp.json();
    if(data.success){
      const photo={
        id:'p'+Date.now(),
        url:data.data.link,
        thumb:data.data.link.replace(/(\.\w+)$/,'m$1'),
        day:pendingDay||guessDay(),
        caption:pendingCaption.trim(),
        ts:Date.now()
      };
      if(firebaseReady)await dbRef.child('photos/'+photo.id).set(photo);
      photos.unshift(photo);
    }else{alert('Errore upload: '+JSON.stringify(data.data))}
  }catch(e){alert('Errore: '+e.message)}
  uploading=false;
  pendingFile=null;pendingPreview=null;pendingCaption="";pendingDay=0;
  render();
}

function resizeImage(file,maxSize){
  return new Promise((resolve)=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const img=new Image();
      img.onload=function(){
        let w=img.width,h=img.height;
        if(w>maxSize||h>maxSize){
          if(w>h){h=Math.round(h*maxSize/w);w=maxSize}
          else{w=Math.round(w*maxSize/h);h=maxSize}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(resolve,'image/jpeg',0.82);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function deletePhoto(id){
  if(!confirm('Eliminare questa foto?'))return;
  if(firebaseReady)dbRef.child('photos/'+id).remove();
  photos=photos.filter(p=>p.id!==id);
  if(lightboxIdx>=photos.length)lightboxIdx=-1;
  render();
}

loadLocal();
render();
initFirebase();
</script>
