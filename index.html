<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="D&A Trip">
<meta name="theme-color" content="#2D6A4F">
<meta name="description" content="Segui il viaggio di Daniele e Angela: Abruzzo, Dolomiti e Umbria!">
<meta property="og:title" content="Daniele & Angela — Abruzzo, Dolomiti & Umbria">
<meta property="og:description" content="Segui il nostro road trip in tempo reale! 10 giorni, 9-18 agosto 2026.">
<title>Daniele & Angela — Viaggio 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26F0;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#F5F2EB;font-family:'DM Sans',system-ui,sans-serif;color:#3C3226;max-width:480px;margin:0 auto;min-height:100dvh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#C4B99A;border-radius:3px}

/* Hero */
.hero{background:linear-gradient(135deg,#2D6A4F 0%,#40916C 60%,#52B788 100%);padding:max(env(safe-area-inset-top),16px) 20px 24px;color:#fff;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:40px;background:#F5F2EB;border-radius:50% 50% 0 0}
.hero-inner{position:relative;z-index:1}
.hero .tag{font-size:9px;text-transform:uppercase;letter-spacing:3px;color:#B7E4C7;margin-bottom:4px}
.hero h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;line-height:1.1;margin-bottom:2px}
.hero .names{font-size:13px;font-weight:600;color:#D8F3DC}
.hero .sub{font-size:11px;color:#B7E4C7;margin:4px 0 16px}
.countdown{background:rgba(255,255,255,.15);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:inline-block}
.countdown-num{font-size:22px;font-weight:700}
.countdown-label{font-size:9px;color:#B7E4C7;text-transform:uppercase;letter-spacing:1px}
.countdown-units{display:flex;gap:12px;justify-content:center}
.countdown-unit{text-align:center}
.stats{display:flex;align-items:center;justify-content:center;gap:12px}
.stats-ring{position:relative;width:46px;height:46px}
.stats-ring svg{transform:rotate(-90deg)}
.stats-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.pbar{height:4px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin-top:12px}
.pbar-fill{height:100%;background:#D8F3DC;border-radius:4px;transition:width .5s}
.day-dots{display:flex;justify-content:space-between;margin-top:6px}
.day-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s}
.live-badge{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:10px;color:#D8F3DC;background:rgba(255,255,255,.12);padding:4px 12px;border-radius:16px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#D8F3DC;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:.5px solid #E8E2D4;position:sticky;top:0;z-index:1000}
.tab{flex:1;padding:10px 0;border:none;background:transparent;color:#B0A48E;font-size:10px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;transition:all .2s}
.tab.active{color:#2D6A4F;border-bottom-color:#2D6A4F}
.content{padding:12px 14px 90px}

/* Map */
#map-container{width:100%;height:50vh;min-height:280px;position:relative}
#map{width:100%;height:100%;border-radius:0 0 12px 12px}
.map-info{padding:12px 14px}
.map-status{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.map-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.map-status-title{font-size:13px;font-weight:600;color:#3C3226}
.map-status-sub{font-size:10px;color:#8B7355;margin-top:1px}
.map-next{background:#E8F5E9;border:.5px solid #C8E6C9;border-radius:12px;padding:12px;margin-top:8px;display:flex;align-items:center;gap:10px}

/* Weather */
.weather{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:12px;margin-top:8px;display:flex;align-items:center;gap:12px}
.weather-icon{font-size:28px}
.weather-temp{font-size:22px;font-weight:700;color:#3C3226}
.weather-desc{font-size:11px;color:#8B7355}
.weather-place{font-size:10px;color:#B0A48E}

/* Cards */
.card{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;margin-bottom:8px;overflow:hidden;transition:all .2s}
.card-head{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.card-emoji{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.card-date{font-size:9px;color:#B0A48E;margin-left:6px;font-weight:500}
.card-title{font-size:14px;font-weight:600;color:#3C3226;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-km{font-size:10px;color:#8B7355;margin-top:1px}
.card-prog{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.card-prog-txt{font-size:8px;color:#B0A48E}
.card-arrow{font-size:12px;color:#C4B99A;transition:transform .3s;flex-shrink:0}
.card-arrow.open{transform:rotate(180deg)}
.card-body{padding:0 14px 14px}

/* Stops */
.stop{margin:6px 0;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:10px;overflow:hidden}
.stop-row{display:flex;align-items:center;gap:8px;padding:10px 12px}
.chk{width:24px;height:24px;border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;border:2px solid #D4C9B8;background:transparent;transition:all .2s}
.chk.on{border-color:var(--c);background:var(--c)}
.chk.readonly{cursor:default;opacity:.6}
.stop-name{font-size:13px;font-weight:600;color:#3C3226}
.stop-name.done{text-decoration:line-through;color:#B0A48E}
.stop-preview{font-size:10px;color:#8B7355;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stop-maps{font-size:9px;font-weight:600;color:#2D6A4F;text-decoration:none;padding:4px 10px;border-radius:12px;border:.5px solid #2D6A4F40;white-space:nowrap;flex-shrink:0}
.stop-detail{padding:0 12px 10px 44px}
.stop-desc{font-size:12px;color:#6B5D4D;line-height:1.65}
.stop-tip{margin-top:6px;font-size:11px;color:#2D6A4F;background:#E8F5E9;padding:6px 10px;border-radius:8px;border-left:3px solid #2D6A450}
.stop-warn{margin-top:6px;font-size:11px;color:#854F0B;background:#FFF8E1;padding:6px 10px;border-radius:8px;border-left:3px solid #F9A82540}

/* Timeline */
.timeline{display:flex;gap:4px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:8px}
.timeline::-webkit-scrollbar{display:none}
.tl-item{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:54px;padding:6px 4px;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:8px;font-size:9px;color:#8B7355;text-align:center;flex-shrink:0}
.tl-time{font-weight:700;color:#2D6A4F;font-size:10px}
.tl-name{font-size:8px;color:#6B5D4D;line-height:1.2}

/* Info row */
.info-row{display:flex;gap:6px;margin-top:10px}
.info-box{flex:1;border-radius:8px;padding:8px 10px}
.info-label{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.info-val{font-size:11px;line-height:1.5;margin-top:2px}
.special-route{display:block;margin-top:10px;padding:10px;border-radius:10px;text-decoration:none;text-align:center;font-size:12px;font-weight:600}

/* Diary */
.diary-entry{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:14px;margin-bottom:10px}
.diary-date{font-size:10px;color:#2D6A4F;font-weight:600;margin-bottom:4px}
.diary-text{font-size:13px;color:#3C3226;line-height:1.7}
.diary-add{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:14px;margin-bottom:14px}
.diary-textarea{width:100%;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:10px;padding:10px;color:#3C3226;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:80px}
.diary-textarea:focus{border-color:#2D6A4F}
.diary-textarea::placeholder{color:#C4B99A}

/* Routes */
.route-card{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:8px;border-radius:12px;text-decoration:none;background:#fff;border:.5px solid #E8E2D4}
.route-icon{font-size:24px;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.route-label{font-size:14px;font-weight:600;color:#3C3226}
.route-sub{font-size:11px;color:#8B7355;margin-top:1px}
.pins-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.pin-chip{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:16px;text-decoration:none;font-size:11px;font-weight:500;background:#fff;border:.5px solid #E8E2D4;color:#6B5D4D;transition:all .2s}

/* Gallery */
.gal-btns{display:flex;gap:8px;margin-bottom:12px}
.gal-btn{flex:1;background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer}
.gal-btn-icon{font-size:22px;margin-bottom:2px}
.gal-btn-text{font-size:11px;color:#2D6A4F;font-weight:600}
.gal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.gal-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;background:#E8E2D4}
.gal-thumb img{width:100%;height:100%;object-fit:cover}
.gal-thumb-day{position:absolute;top:4px;left:4px;font-size:8px;font-weight:700;background:rgba(0,0,0,.5);color:#fff;padding:2px 6px;border-radius:6px}
.gal-thumb-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(192,57,43,.8);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gal-preview{background:#fff;border:.5px solid #2D6A4F40;border-radius:12px;padding:14px;margin-bottom:14px}
.gal-preview img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-bottom:10px;background:#FAFAF6}
.gal-input{width:100%;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:10px;padding:10px;color:#3C3226;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px}
.gal-input:focus{border-color:#2D6A4F}
.gal-day-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.gal-day-btn{padding:4px 10px;border-radius:14px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.gal-day-btn.act{border-color:#2D6A4F;color:#2D6A4F;background:#E8F5E9}
.gal-filter{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.gal-filter::-webkit-scrollbar{display:none}
.gal-filter-btn{padding:5px 12px;border-radius:16px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.gal-filter-btn.act{border-color:#2D6A4F;color:#2D6A4F;background:#E8F5E9}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:12px;flex-direction:column}
.lightbox img{max-width:100%;max-height:70vh;border-radius:8px;object-fit:contain}
.lightbox-caption{color:#aaa;font-size:12px;margin-top:10px;text-align:center}
.lightbox-close{position:absolute;top:max(16px,env(safe-area-inset-top));right:16px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-prev{left:8px}.lightbox-next{right:8px}

/* Admin/Private */
.sub-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:7px 12px;border-radius:16px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.sub-tab.act{border-color:#2D6A4F;color:#2D6A4F;background:#E8F5E9}
.exp-total-card{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:16px;text-align:center;margin-bottom:12px}
.exp-total-num{font-size:28px;font-weight:700;color:#3C3226}
.exp-total-sub{font-size:11px;color:#8B7355;margin-top:2px}
.exp-total-pp{font-size:14px;color:#2D6A4F;font-weight:600;margin-top:4px}
.exp-cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.exp-cat-card{background:#fff;border:.5px solid #E8E2D4;border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px}
.exp-cat-icon{font-size:18px}
.exp-cat-name{font-size:10px;color:#8B7355}
.exp-cat-val{font-size:14px;font-weight:700;color:#3C3226}
.form-box{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:14px;margin-bottom:12px}
.form-label{font-size:10px;font-weight:700;color:#2D6A4F;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.form-row{display:flex;gap:6px;margin-bottom:8px}
.form-input{flex:1;background:#FAFAF6;border:.5px solid #E8E2D4;border-radius:8px;padding:9px 10px;color:#3C3226;font-size:13px;font-family:inherit;outline:none;min-width:0}
.form-input:focus{border-color:#2D6A4F}
.form-input::placeholder{color:#C4B99A}
.form-cats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.form-cat{padding:5px 10px;border-radius:14px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.form-cat.act{border-color:var(--c);color:var(--c);background:color-mix(in srgb,var(--c) 8%,#fff)}
.form-days{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.form-day{padding:4px 9px;border-radius:12px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:9px;font-weight:600;cursor:pointer;font-family:inherit}
.form-day.act{border-color:#2D6A4F;color:#2D6A4F;background:#E8F5E9}
.btn-primary{width:100%;padding:11px;border-radius:10px;border:none;background:#2D6A4F;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary:active{opacity:.8}
.btn-secondary{padding:10px 16px;border-radius:10px;border:.5px solid #E8E2D4;background:#fff;color:#8B7355;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.exp-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border:.5px solid #E8E2D4;border-radius:10px;margin-bottom:5px}
.exp-item-name{font-size:12px;font-weight:600;color:#3C3226;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-item-meta{font-size:9px;color:#B0A48E;margin-top:1px}
.exp-item-amount{font-size:13px;font-weight:700;color:#3C3226;flex-shrink:0}
.exp-item-del{width:24px;height:24px;border-radius:6px;border:none;background:#FEF0F0;color:#C0392B;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hotel-card{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:14px;margin-bottom:8px;position:relative}
.hotel-name{font-size:15px;font-weight:600;color:#3C3226;margin-bottom:6px}
.hotel-row{display:flex;align-items:center;gap:6px;font-size:11px;color:#6B5D4D;margin-top:4px}
.hotel-nav{display:flex;gap:6px;margin-top:10px}
.hotel-nav a{flex:1;padding:9px;border-radius:8px;text-decoration:none;text-align:center;font-size:12px;font-weight:600}
.nav-go{background:#E8F5E9;color:#2D6A4F;border:.5px solid #C8E6C9}
.nav-call{background:#FFF8E1;color:#854F0B;border:.5px solid #FFE082}
.hotel-del{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:6px;background:#FEF0F0;color:#C0392B;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hotel-day-tag{font-size:8px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:6px}
.note-card{background:#fff;border:.5px solid #E8E2D4;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;gap:8px;align-items:flex-start}
.note-warn{border-left:3px solid #F9A825;background:#FFFDE7}
.note-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.note-text{font-size:11px;color:#6B5D4D;line-height:1.6}
.note-text strong{color:#3C3226}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.budget-card{background:#fff;border:.5px solid #E8E2D4;border-radius:10px;padding:10px}
.budget-label{font-size:9px;font-weight:700;color:#8B7355;text-transform:uppercase;letter-spacing:1px}
.budget-val{font-size:17px;font-weight:700;color:#3C3226;margin-top:2px}
.budget-sub{font-size:9px;color:#B0A48E;margin-top:1px}
.precheck-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border:.5px solid #E8E2D4;border-radius:10px;margin-bottom:5px}
.precheck-text{flex:1;font-size:12px;color:#3C3226}
.precheck-text.done{text-decoration:line-through;color:#B0A48E}

/* Floating buttons */
.fab{position:fixed;bottom:max(16px,env(safe-area-inset-bottom));right:14px;width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.12);z-index:20;font-size:14px}
.fab-admin{background:#2D6A4F;color:#fff}
.fab-login{background:#fff;color:#8B7355;border:.5px solid #E8E2D4}

/* Login popup */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.pin-box{background:#fff;border-radius:16px;padding:28px 24px;text-align:center;width:100%;max-width:300px}
.pin-box h2{font-family:'Playfair Display',serif;font-size:20px;color:#3C3226;margin-bottom:4px}
.pin-box p{font-size:11px;color:#8B7355;margin-bottom:16px}
.pin-input{width:140px;padding:10px;border-radius:10px;border:.5px solid #E8E2D4;background:#FAFAF6;color:#3C3226;font-size:18px;text-align:center;letter-spacing:8px;font-family:inherit;outline:none}
.pin-input:focus{border-color:#2D6A4F}
.pin-error{color:#C0392B;font-size:10px;margin-top:6px;min-height:14px}
.pin-cancel{margin-top:12px;background:none;border:none;color:#B0A48E;font-size:11px;cursor:pointer;text-decoration:underline;font-family:inherit}

/* Summary */
.summary-card{background:#fff;border:.5px solid #E8E2D4;border-radius:12px;padding:16px;margin-bottom:10px;text-align:center}
.summary-big{font-size:28px;font-weight:700;color:#2D6A4F}
.summary-label{font-size:11px;color:#8B7355;margin-top:2px}

try{if(localStorage.getItem(LS("adm"))==="1")isAdmin=true}catch(e){}
}
function save(k,v){try{localStorage.setItem(LS(k),JSON.stringify(v))}catch(e){}}

function saveNts(){save("nts",notes)}

// FIREBASE
function initFB(){
if(!fbOk)return;
db.child('position').on('value',s=>{const v=s.val();if(v){livePos={lat:v.lat,lng:v.lng};lastUpdate=v.ts;updateMarker();if(tab!=="map")render()}});
db.child('checks').on('value',s=>{const v=s.val();if(v&&!isAdmin){checks=v;render()}});
db.child('diary').on('value',s=>{const v=s.val();if(v&&!isAdmin){diary=Array.isArray(v)?v:Object.values(v);render()}});
db.child('photos').on('value',s=>{const v=s.val();if(v){photos=Object.values(v).sort((a,b)=>b.ts-a.ts)}else{photos=[]}if(tab==="gallery")render()});
}

// GPS
function startGPS(){if(!navigator.geolocation)return;isTracking=true;gpsWatchId=navigator.geolocation.watchPosition(p=>{livePos={lat:p.coords.latitude,lng:p.coords.longitude};lastUpdate=Date.now();if(fbOk)db.child('position').set({lat:livePos.lat,lng:livePos.lng,ts:lastUpdate});updateMarker();render()},e=>{},{enableHighAccuracy:true,maximumAge:10000,timeout:15000});render()}
function stopGPS(){if(gpsWatchId!==null)navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;isTracking=false;render()}
function sendPos(){navigator.geolocation.getCurrentPosition(p=>{livePos={lat:p.coords.latitude,lng:p.coords.longitude};lastUpdate=Date.now();if(fbOk)db.child('position').set({lat:livePos.lat,lng:livePos.lng,ts:lastUpdate});updateMarker();render()},e=>alert("GPS: "+e.message),{enableHighAccuracy:true,timeout:10000})}

// MAP
function initMap(){
if(leafletMap){leafletMap.remove();leafletMap=null;posMarker=null}
const el=document.getElementById('map');if(!el)return;
leafletMap=L.map(el,{zoomControl:false,attributionControl:false}).setView([43.5,13],6);
L.control.zoom({position:'topright'}).addTo(leafletMap);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(leafletMap);
L.polyline(ROUTE_LINE,{color:'#2D6A4F',weight:3,opacity:.35,dashArray:'8,8'}).addTo(leafletMap);
ALL_STOPS.forEach(s=>{if(!s.lat)return;const d=!!checks[s.di+"-"+s.si];const ic=L.divIcon({className:'custom-marker',html:'<div class="marker-pin" style="background:'+(d?s.dayColor:s.dayColor+'50')+';border-color:'+(d?'#fff':s.dayColor)+';color:#fff">'+(d?'\u2713':s.dayNum)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
L.marker([s.lat,s.lng],{icon:ic}).addTo(leafletMap).bindPopup('<b>'+s.name+'</b><br><a href="'+s.map+'" target="_blank" style="font-size:11px">Apri in Maps</a>')});
leafletMap.fitBounds(L.polyline(ROUTE_LINE).getBounds().pad(.1));
setTimeout(()=>{if(leafletMap)leafletMap.invalidateSize()},200);
}
function updateMarker(){if(!leafletMap||!livePos)return;if(!posMarker){posMarker=L.marker([livePos.lat,livePos.lng],{icon:L.divIcon({className:'custom-marker',html:'<div class="marker-you"></div>',iconSize:[16,16],iconAnchor:[8,8]}),zIndexOffset:1000}).addTo(leafletMap)}else posMarker.setLatLng([livePos.lat,livePos.lng])}
function centerMe(){if(leafletMap&&livePos)leafletMap.setView([livePos.lat,livePos.lng],13,{animate:true})}

// WEATHER
async function fetchWeather(lat,lng){

// ACTIONS
function sw(t){tab=t;openDay=null;openStop=null;render();window.scrollTo(0,0)}
function togDay(i){openDay=openDay===i?null:i;openStop=null;render()}
function togStop(k){openStop=openStop===k?null:k;render()}
function togChk(d,s){if(!isAdmin)return;const k=d+"-"+s;checks[k]=!checks[k];if(!checks[k])delete checks[k];saveChk();render()}
function tryPin(v){if(v.length===4){if(v===PIN){isAdmin=true;showLogin=false;pinErr="";saveAdm();render();initFB()}else{pinErr="PIN errato";render();setTimeout(()=>{const e=document.getElementById('pin-input');if(e){e.value='';e.focus()}},100)}}}
function openLogin(){showLogin=true;pinErr="";render();setTimeout(()=>{const e=document.getElementById('pin-input');if(e)e.focus()},100)}
function closeLogin(){showLogin=false;pinErr="";render()}
function logout(){isAdmin=false;showLogin=false;stopGPS();saveAdm();tab="map";render()}
function setExpCat(c){expCat=c;render()}
function addExp(){const d=document.getElementById('exp-desc'),a=document.getElementById('exp-amt'),v=parseFloat(a.value);if(!v||v<=0){a.focus();return}expenses.push({desc:d.value.trim()||CATS.find(c=>c.id===expCat).name,amount:v,cat:expCat,day:expDay,ts:Date.now()});saveExp();expCat="food";expDay=0;render()}
function delExp(i){expenses.splice(i,1);saveExp();render()}
function addHotel(){const n=document.getElementById('h-name').value.trim();if(!n)return;hotels.push({name:n,address:document.getElementById('h-addr').value.trim(),phone:document.getElementById('h-phone').value.trim(),price:parseFloat(document.getElementById('h-price').value)||0,confirm:document.getElementById('h-conf').value.trim(),day:expDay||1,ts:Date.now()});saveHtl();expDay=0;render()}
function delHotel(i){hotels.splice(i,1);saveHtl();render()}
function addNote(){const t=document.getElementById('note-text').value.trim();if(!t)return;notes.push({text:t,ts:Date.now()});saveNts();render()}
function delNote(i){notes.splice(i,1);saveNts();render()}
function addDiary(){const t=document.getElementById('diary-text').value.trim();if(!t)return;diary.push({text:t,day:expDay||1,ts:Date.now()});saveDry();expDay=0;render()}
function delDiary(i){diary.splice(i,1);saveDry();render()}

function prepPhoto(f){if(!f)return;pendingFile=f;pendingCaption="";pendingDay=1;for(let i=DAYS.length-1;i>=0;i--)for(let j=DAYS[i].stops.length-1;j>=0;j--)if(checks[i+"-"+j]){pendingDay=DAYS[i].day;i=-1;break}
const r=new FileReader();r.onload=e=>{pendingPreview=e.target.result;render()};r.readAsDataURL(f)}
function cancelPhoto(){pendingFile=null;pendingPreview=null;render()}
async function confirmPhoto(){if(!pendingFile||uploading)return;const c=document.getElementById('photo-caption');if(c)pendingCaption=c.value;uploading=true;render();
try{const rs=await resizeImg(pendingFile,1200);const fd=new FormData();fd.append('image',rs);
const r=await fetch('https://api.imgur.com/3/image',{method:'POST',headers:{'Authorization':'Client-ID '+IMGUR_CID},body:fd});
const d=await r.json();if(d.success){const p={id:'p'+Date.now(),url:d.data.link,thumb:d.data.link.replace(/(\.[a-z]+)$/i,'m$1'),day:pendingDay,caption:pendingCaption.trim(),ts:Date.now()};
if(fbOk)await db.child('photos/'+p.id).set(p);photos.unshift(p)}}catch(e){alert('Errore: '+e.message)}
uploading=false;pendingFile=null;pendingPreview=null;render()}
function resizeImg(f,mx){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const i=new Image();i.onload=()=>{let w=i.width,h=i.height;if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx}else{w=Math.round(w*mx/h);h=mx}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);c.toBlob(r,'image/jpeg',.82)};i.src=e.target.result};rd.readAsDataURL(f)})}
function delPhoto(id){if(!confirm('Eliminare?'))return;if(fbOk)db.child('photos/'+id).remove();photos=photos.filter(p=>p.id!==id);render()}

// INIT
loadAll();render();initFB();
// Countdown timer
setInterval(()=>{const cd=countdownText();if(cd&&!cd.live){const el=document.querySelector('.countdown');if(el)render()}},60000);

// Service Worker for offline
if('serviceWorker' in navigator){
const sw=URL.createObjectURL(new Blob([`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>{
if(e.request.url.includes('api.open-meteo')||e.request.url.includes('api.imgur')||e.request.url.includes('firebase'))return;
e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
if(res.ok){const c=res.clone();caches.open('trip-v1').then(cache=>cache.put(e.request,c))}return res}).catch(()=>caches.match(e.request))))});
`],{type:'application/javascript'}));
navigator.serviceWorker.register(sw).catch(()=>{});}
