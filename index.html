<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="D&A Trip">
<meta name="theme-color" content="#2D6A4F">
<meta name="description" content="Segui il viaggio di Daniele e Angela: Abruzzo e Umbria!">
<meta property="og:title" content="Daniele & Angela — Abruzzo & Umbria">
<meta property="og:description" content="Segui il nostro road trip in tempo reale! 8 giorni, 14-21 agosto 2026.">
<title>Daniele & Angela — Viaggio 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26F0;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
/* =============================================
   AIRBNB-STYLE DESIGN SYSTEM v16
   ============================================= */

:root {
  /* Palette Airbnb */
  --white: #FFFFFF;
  --black: #222222;
  --gray-900: #222222;
  --gray-800: #363636;
  --gray-700: #484848;
  --gray-600: #5E5E5E;
  --gray-500: #717171;
  --gray-400: #B0B0B0;
  --gray-300: #DDDDDD;
  --gray-200: #EBEBEB;
  --gray-100: #F7F7F7;
  --gray-50:  #FAFAFA;
  --rausch: #FF385C;
  --rausch-hover: #E31C5F;
  --rausch-dark: #C13515;
  --rausch-light: #FFF0F3;
  --babu: #00A699;
  --arches: #FC642D;
  --hof: #484848;
  --forest: #008A05;
  --gold: #FFB400;

  /* Typography */
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;
  --sp-8: 64px;

  /* Radius */
  --r-xs: 4px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
  --r-full: 999px;

  /* Shadow */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 6px 20px rgba(0,0,0,0.10);
  --shadow-lg: 0 16px 40px rgba(0,0,0,0.16);
  --shadow-hover: 0 6px 16px rgba(0,0,0,0.12);
}

body.dark {
  --white: #191919;
  --black: #F7F7F7;
  --gray-900: #F7F7F7;
  --gray-800: #E5E5E5;
  --gray-700: #C7C7C7;
  --gray-600: #A8A8A8;
  --gray-500: #909090;
  --gray-400: #6E6E6E;
  --gray-300: #404040;
  --gray-200: #303030;
  --gray-100: #262626;
  --gray-50:  #1E1E1E;
  --rausch-light: #3A1A20;
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-sm: 0 2px 4px rgba(0,0,0,0.4);
  --shadow-md: 0 6px 20px rgba(0,0,0,0.5);
}

/* =============================================
   BASE RESET
   ============================================= */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  color: var(--gray-900);
  background: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

button {
  font-family: inherit;
  border: none;
  background: none;
  cursor: pointer;
  color: inherit;
  padding: 0;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a { color: inherit; text-decoration: none; }

img { max-width: 100%; height: auto; display: block; }

/* =============================================
   LAYOUT
   ============================================= */

.app-layout, .content-area, #content-area {
  background: var(--white);
  width: 100%;
  max-width: 100%;
}

.content-area {
  padding: 0;
}

@media (min-width: 768px) {
  .app-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    max-width: 1200px;
    margin: 0 auto;
    min-height: 100vh;
  }
  .sidebar {
    border-right: 1px solid var(--gray-200);
    padding: var(--sp-6) var(--sp-5);
  }
}

/* =============================================
   HERO
   ============================================= */

.hero, .hero-dynamic {
  background: var(--white);
  color: var(--gray-900);
  padding: var(--sp-6) var(--sp-5) var(--sp-4);
  border-bottom: 1px solid var(--gray-200);
  position: relative;
}

.hero-inner {
  text-align: left;
  max-width: 100%;
}

.hero .tag, .hero-tag-mini {
  display: inline-block;
  background: var(--rausch-light);
  color: var(--rausch);
  padding: var(--sp-1) var(--sp-3);
  border-radius: var(--r-full);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2px;
  margin-bottom: var(--sp-3);
  text-transform: none;
  border: none;
}

.hero h1, .hero-title-mini {
  font-family: var(--font-body);
  font-size: 30px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.8px;
  color: var(--gray-900);
  margin: 0 0 var(--sp-2) 0;
  text-align: left;
  font-style: normal;
}

.hero .names {
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-700);
  text-align: left;
  margin: 0;
}

.hero .sub, .hero-sub-mini {
  font-size: 14px;
  color: var(--gray-500);
  margin-top: var(--sp-1);
  text-align: left;
  font-style: normal;
  opacity: 1;
  font-weight: 400;
}

.theme-toggle {
  position: absolute;
  top: var(--sp-5);
  right: var(--sp-5);
  width: 36px;
  height: 36px;
  border-radius: var(--r-full);
  background: var(--white);
  border: 1px solid var(--gray-300);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  cursor: pointer;
  transition: box-shadow 0.2s;
  color: var(--gray-700);
}
.theme-toggle:hover { box-shadow: var(--shadow-sm); }

/* Countdown */
.countdown {
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-top: var(--sp-4);
}

.countdown-units {
  display: flex;
  gap: var(--sp-5);
  justify-content: flex-start;
}

.countdown-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--gray-900);
  letter-spacing: -0.8px;
  line-height: 1;
}

.countdown-label {
  font-size: 11px;
  color: var(--gray-500);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: var(--sp-1);
}

/* Stats ring */
.stats {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-top: var(--sp-3);
  display: flex;
  align-items: center;
  gap: var(--sp-4);
}

.stats-ring circle:first-child { stroke: var(--gray-200); }
.stats-ring circle:nth-child(2) { stroke: var(--rausch); stroke-linecap: round; }

.stats-ring-text {
  color: var(--gray-900);
  font-weight: 600;
  font-size: 13px;
}

.stats > div:last-child > div:first-child {
  color: var(--gray-900) !important;
  font-weight: 600 !important;
  font-size: 13px !important;
}

.stats > div:last-child > div:nth-child(2) {
  color: var(--gray-500) !important;
  font-size: 11px !important;
}

/* Progress bar */
.pbar {
  background: var(--gray-200);
  height: 4px;
  border-radius: var(--r-full);
  margin-top: var(--sp-3);
  overflow: hidden;
}

.pbar-fill {
  background: var(--rausch);
  border-radius: var(--r-full);
  height: 100%;
}

.day-dots {
  margin-top: var(--sp-3);
  gap: var(--sp-2);
  display: flex;
  justify-content: flex-start;
}

.day-dot {
  background: var(--gray-300);
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.live-badge {
  background: var(--forest);
  color: var(--white);
  border-radius: var(--r-full);
  padding: var(--sp-1) var(--sp-3);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  margin-top: var(--sp-3);
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
}

.live-dot { background: var(--white); width: 6px; height: 6px; border-radius: 50%; }

/* =============================================
   TABS (bottom nav mobile / top nav desktop)
   ============================================= */

.tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 var(--sp-5);
  gap: var(--sp-6);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  color: var(--gray-500);
  font-size: 14px;
  font-weight: 500;
  padding: var(--sp-4) 0;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s;
  background: transparent;
  min-width: auto;
  flex: none;
}

.tab:hover { color: var(--gray-800); }

.tab.active {
  color: var(--gray-900);
  border-bottom-color: var(--gray-900);
  font-weight: 600;
}

/* =============================================
   CARDS
   ============================================= */

.card, .day-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-lg);
  margin-bottom: var(--sp-4);
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover, .day-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.card-hero {
  aspect-ratio: 16/9;
  background-size: cover;
  background-position: center;
  position: relative;
  color: var(--white);
  padding: var(--sp-4);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.card-hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.5) 100%);
  pointer-events: none;
}

.card-hero > * { position: relative; z-index: 1; }

.card-body { padding: var(--sp-4); }

.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-900);
  margin-bottom: var(--sp-1);
}

.card-meta {
  font-size: 13px;
  color: var(--gray-500);
  display: flex;
  gap: var(--sp-2);
  align-items: center;
}

.card-price {
  font-size: 15px;
  font-weight: 600;
  color: var(--gray-900);
  margin-top: var(--sp-2);
}

/* =============================================
   BUTTONS
   ============================================= */

.btn-primary, .btn-secondary, .btn-cta {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  padding: var(--sp-3) var(--sp-5);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  min-height: 40px;
}

.btn-primary {
  background: var(--gray-900);
  color: var(--white);
  width: 100%;
}
.btn-primary:hover { background: var(--gray-800); }
.btn-primary:active { transform: scale(0.98); }

.btn-secondary {
  background: var(--white);
  color: var(--gray-900);
  border: 1px solid var(--gray-900);
}
.btn-secondary:hover { background: var(--gray-100); }

.btn-cta {
  background: linear-gradient(135deg, var(--rausch) 0%, var(--rausch-dark) 100%);
  color: var(--white);
  padding: var(--sp-3) var(--sp-6);
}
.btn-cta:hover { filter: brightness(0.95); }

/* =============================================
   DASHBOARD (area privata)
   ============================================= */

.dash {
  padding: var(--sp-5);
  background: var(--white);
}

.dash-alert {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  transition: box-shadow 0.15s;
}
.dash-alert:hover { box-shadow: var(--shadow-sm); }

.dash-alert.calm { border-left: 3px solid var(--forest); }
.dash-alert:not(.calm) { border-left: 3px solid var(--rausch); }
.dash-alert::before { display: none !important; }

.dash-alert-lbl {
  color: var(--gray-500);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  margin-bottom: 2px;
  opacity: 1;
}

.dash-alert-val {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-900);
  line-height: 1.3;
  font-style: normal;
  letter-spacing: -0.2px;
}

.dash-alert-desc {
  font-size: 13px;
  color: var(--gray-500);
  margin-top: 2px;
}

/* Stats grid */
.dash-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-3);
  margin-bottom: var(--sp-5);
}

.dash-stat {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  text-align: left;
  transition: box-shadow 0.15s;
}
.dash-stat:hover { box-shadow: var(--shadow-sm); }

.dash-stat-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--gray-900);
  letter-spacing: -0.6px;
  line-height: 1;
  font-family: var(--font-body);
}

.dash-stat-lbl {
  font-size: 12px;
  color: var(--gray-500);
  font-weight: 500;
  margin-top: var(--sp-2);
  text-transform: none;
  letter-spacing: 0;
}

.dash-progress {
  background: var(--gray-200);
  height: 4px;
  border-radius: var(--r-full);
  margin-top: var(--sp-2);
  overflow: hidden;
}

.dash-progress-fill {
  background: var(--rausch);
  border-radius: var(--r-full);
  height: 100%;
  transition: width 0.4s;
}

/* Section title */
.dash-section-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--gray-900);
  letter-spacing: -0.3px;
  margin: var(--sp-6) 0 var(--sp-3) 0;
  padding: 0;
  font-family: var(--font-body);
  font-style: normal;
}

/* Macro cards - stile lista Airbnb */
.macro-grid {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: var(--sp-5);
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  overflow: hidden;
}

.macro-card {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: var(--sp-4);
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  border-bottom: 1px solid var(--gray-200);
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
}

.macro-card:hover { background: var(--gray-50); }
.macro-card:last-child { border-bottom: none; }

.macro-card::after {
  content: "";
  position: absolute;
  right: var(--sp-4);
  top: 50%;
  width: 8px;
  height: 8px;
  border-right: 2px solid var(--gray-400);
  border-top: 2px solid var(--gray-400);
  transform: translateY(-50%) rotate(45deg);
}

.macro-card::before { display: none !important; }

.macro-icon {
  width: 44px;
  height: 44px;
  background: var(--gray-100);
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  margin-bottom: 0;
}

.macro-card.money .macro-icon { background: var(--rausch-light); color: var(--rausch); }
.macro-card.travel .macro-icon { background: #E8F4F1; color: var(--babu); }
.macro-card.prep .macro-icon { background: #FFEEDB; color: var(--arches); }
.macro-card.memories .macro-icon { background: var(--gray-100); }

.macro-name {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  color: var(--gray-900);
  letter-spacing: -0.1px;
  margin: 0 0 2px 0;
}

.macro-sub {
  font-size: 13px;
  color: var(--gray-500);
  line-height: 1.4;
}

.macro-highlight {
  color: var(--gray-500);
  font-weight: 400;
  font-size: 12px;
  margin-top: 2px;
}

.macro-badge {
  background: var(--rausch);
  color: var(--white);
  position: absolute;
  right: 44px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: var(--r-full);
  font-weight: 600;
}

/* Quick actions */
.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-3);
  margin-bottom: var(--sp-5);
}

.quick-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  text-align: center;
  cursor: pointer;
  transition: box-shadow 0.15s;
}
.quick-card:hover { box-shadow: var(--shadow-sm); }

.quick-icon { font-size: 22px; margin-bottom: var(--sp-2); display: block; }
.quick-lbl {
  color: var(--gray-900);
  font-size: 12px;
  font-weight: 500;
  line-height: 1.3;
}

/* Sub-nav (back button + title) */
.sec-nav {
  display: grid;
  grid-template-columns: 60px 1fr 60px;
  align-items: center;
  padding: var(--sp-4) var(--sp-5) var(--sp-3);
  background: var(--white);
}

.sec-back {
  color: var(--gray-700);
  font-size: 14px;
  font-weight: 500;
  background: transparent;
  border: none;
  padding: var(--sp-2) 0;
  text-align: left;
  cursor: pointer;
  min-width: 60px;
}
.sec-back:hover { color: var(--gray-900); }

.sec-title-txt {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 16px;
  color: var(--gray-900);
  letter-spacing: -0.2px;
  text-align: center;
  font-style: normal;
}

/* Sub-pills orizzontali */
.sub-pills {
  display: flex;
  overflow-x: auto;
  padding: 0 var(--sp-5) var(--sp-4);
  gap: var(--sp-2);
  scrollbar-width: none;
}
.sub-pills::-webkit-scrollbar { display: none; }

.sub-pill {
  background: var(--white);
  color: var(--gray-700);
  padding: var(--sp-2) var(--sp-4);
  border-radius: var(--r-full);
  border: 1px solid var(--gray-300);
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.sub-pill:hover { border-color: var(--gray-900); }

.sub-pill.active {
  background: var(--gray-900);
  color: var(--white);
  border-color: var(--gray-900);
}

.sub-tabs { display: none !important; }

/* Private content wrapper */
.private-content, .private-sub-content {
  display: block;
  width: 100%;
  padding: 0;
}

.private-sub-content {
  padding: 0 var(--sp-5) var(--sp-6);
}

.private-sub-content > * {
  width: 100%;
  max-width: 100%;
  display: block;
}

/* Export button */
.export-mega {
  background: linear-gradient(135deg, var(--rausch) 0%, var(--rausch-dark) 100%);
  color: var(--white);
  border-radius: var(--r-sm);
  font-size: 14px;
  font-weight: 600;
  padding: var(--sp-4);
  border: none;
  width: 100%;
  cursor: pointer;
  transition: filter 0.15s;
  letter-spacing: 0;
}
.export-mega:hover { filter: brightness(0.95); }

/* =============================================
   ITEM CARDS (spese, hotel, contatti, ecc.)
   ============================================= */

.exp-item, .hotel-card, .note-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-2);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}

.exp-item:hover, .hotel-card:hover, .note-card:hover {
  border-color: var(--gray-300);
}

.exp-item > div:first-child {
  flex-shrink: 0;
  font-size: 20px;
}

.exp-item > div:nth-child(2) {
  flex: 1;
  min-width: 0;
}

.exp-item-name, .hotel-name {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-900);
  letter-spacing: -0.1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.exp-item-meta, .hotel-row {
  font-size: 12px;
  color: var(--gray-500);
  font-weight: 400;
  margin-top: 2px;
}

.exp-item-amount {
  font-size: 16px;
  font-weight: 700;
  color: var(--gray-900);
  letter-spacing: -0.3px;
  margin-left: auto;
  flex-shrink: 0;
  font-family: var(--font-body);
}

/* Hotel card layout special */
.hotel-card {
  position: relative;
  display: block;
  padding: var(--sp-4);
  padding-right: 80px;
}

/* Total card - hero grande */
.exp-total-card {
  background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-800) 100%);
  color: var(--white);
  border: none;
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  margin-bottom: var(--sp-3);
  text-align: left;
  position: relative;
  overflow: hidden;
}

.exp-total-card::before {
  content: "";
  position: absolute;
  top: -50%;
  right: -20%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,56,92,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.exp-total-num {
  font-family: var(--font-body);
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1.2px;
  line-height: 1;
  color: var(--white);
  position: relative;
}

.exp-total-sub {
  font-family: var(--font-body);
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  opacity: 1;
  margin-top: var(--sp-2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 500;
}

.exp-total-pp {
  font-family: var(--font-body);
  font-size: 14px;
  color: rgba(255,255,255,0.9);
  margin-top: var(--sp-3);
  font-weight: 500;
}

/* =============================================
   FORMS
   ============================================= */

.form-box {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
}

.form-label {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  color: var(--gray-900);
  letter-spacing: -0.2px;
  margin-bottom: var(--sp-3);
  font-style: normal;
}

.form-input {
  background: var(--white);
  border: 1px solid var(--gray-300);
  border-radius: var(--r-sm);
  padding: var(--sp-3) var(--sp-4);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--gray-900);
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
  box-sizing: border-box;
}

.form-input:focus {
  border-color: var(--gray-900);
  border-width: 2px;
  padding: calc(var(--sp-3) - 1px) calc(var(--sp-4) - 1px);
}

.form-input::placeholder { color: var(--gray-400); }

.form-cats {
  display: flex;
  gap: var(--sp-2);
  flex-wrap: wrap;
  margin-bottom: var(--sp-3);
}

.form-cat {
  background: var(--white);
  color: var(--gray-700);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-full);
  border: 1px solid var(--gray-300);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  --c: var(--gray-900);
}
.form-cat:hover { border-color: var(--gray-900); }

.form-cat.act {
  background: var(--gray-900);
  color: var(--white);
  border-color: var(--gray-900);
}

.form-day {
  background: var(--white);
  color: var(--gray-700);
  border: 1px solid var(--gray-300);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.form-day:hover { border-color: var(--gray-900); }

.form-day.act {
  background: var(--gray-900);
  color: var(--white);
  border-color: var(--gray-900);
}

/* =============================================
   EDIT / DELETE BUTTONS
   ============================================= */

.exp-item-edit, .hotel-edit {
  background: transparent;
  color: var(--gray-600);
  width: 32px;
  height: 32px;
  border-radius: var(--r-sm);
  font-size: 13px;
  border: 1px solid var(--gray-300);
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  flex-shrink: 0;
}
.exp-item-edit:hover, .hotel-edit:hover {
  background: var(--gray-100);
  color: var(--gray-900);
}

.exp-item-del, .hotel-del {
  background: transparent;
  color: var(--rausch);
  width: 32px;
  height: 32px;
  border-radius: var(--r-sm);
  font-size: 13px;
  border: 1px solid var(--gray-300);
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  flex-shrink: 0;
}
.exp-item-del:hover, .hotel-del:hover {
  background: var(--rausch-light);
  border-color: var(--rausch);
}

.hotel-edit {
  position: absolute;
  top: var(--sp-3);
  right: 46px;
}

.hotel-del {
  position: absolute;
  top: var(--sp-3);
  right: var(--sp-3);
}

/* =============================================
   PRECHECK / VALIGIA / TODO ITEMS
   ============================================= */

.precheck-item {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-sm);
  padding: var(--sp-3) var(--sp-4);
  margin-bottom: var(--sp-2);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  border-left: 1px solid var(--gray-200);
  transition: background 0.15s;
}
.precheck-item:hover { background: var(--gray-50); }

.chk {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--gray-400);
  background: var(--white);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  font-size: 12px;
  color: transparent;
  --c: var(--gray-900);
}
.chk:hover { border-color: var(--gray-900); }

.chk.on {
  background: var(--gray-900);
  border-color: var(--gray-900);
  color: var(--white);
}

.precheck-text {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--gray-900);
  font-weight: 400;
  line-height: 1.4;
  flex: 1;
  min-width: 0;
  overflow-wrap: break-word;
}

.precheck-text.done {
  color: var(--gray-400);
  text-decoration: line-through;
}

/* =============================================
   BUDGET
   ============================================= */

.budget-cat {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-2);
}

.budget-cat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--sp-2);
  margin-bottom: var(--sp-2);
  flex-wrap: wrap;
}

.budget-cat-name {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13px;
  color: var(--gray-900);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.budget-cat-amounts {
  font-size: 12px;
  color: var(--gray-500);
  font-family: var(--font-body);
}

.budget-bar {
  background: var(--gray-200);
  height: 4px;
  border-radius: var(--r-full);
  overflow: hidden;
}

.budget-bar-fill {
  background: var(--forest);
  border-radius: var(--r-full);
  height: 100%;
  transition: width 0.4s;
}
.budget-bar-fill.warn { background: var(--gold); }
.budget-bar-fill.over { background: var(--rausch); }

/* =============================================
   FOOD PHOTO
   ============================================= */

.food-photo {
  width: 100%;
  height: 200px;
  border-radius: var(--r-md);
  object-fit: cover;
  margin-bottom: var(--sp-3);
  display: block;
  background: var(--gray-100);
}

.food-photo-input { display: none; }

.food-photo-btn {
  width: 100%;
  padding: var(--sp-3);
  background: var(--white);
  border: 1px dashed var(--gray-300);
  border-radius: var(--r-sm);
  color: var(--gray-700);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: var(--sp-3);
  display: block;
  text-align: center;
  transition: border-color 0.15s;
}
.food-photo-btn:hover { border-color: var(--gray-900); color: var(--gray-900); }

.food-photo-preview {
  position: relative;
  margin-bottom: var(--sp-3);
}
.food-photo-preview img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: var(--r-md);
  display: block;
}
.food-photo-preview button {
  position: absolute;
  top: var(--sp-2);
  right: var(--sp-2);
  background: rgba(0,0,0,0.7);
  color: var(--white);
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

/* =============================================
   WEATHER / PLAYLIST WIDGETS
   ============================================= */

.weather, .playlist-widget {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-md);
  padding: var(--sp-4);
}

/* =============================================
   FAB (Floating Action Buttons)
   ============================================= */

.fab {
  position: fixed;
  bottom: var(--sp-5);
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:hover { transform: scale(1.05); box-shadow: var(--shadow-lg); }
.fab:active { transform: scale(0.95); }

.fab-sos {
  right: var(--sp-5);
  background: var(--rausch);
  color: var(--white);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.5px;
  box-shadow: var(--shadow-md);
}

.fab-login, .fab-admin {
  right: calc(var(--sp-5) + 64px);
  box-shadow: var(--shadow-sm);
}

.fab-login {
  background: var(--white);
  color: var(--gray-700);
  border: 1px solid var(--gray-300);
}

.fab-admin {
  background: var(--gray-900);
  color: var(--white);
}

/* =============================================
   MODALS
   ============================================= */

.sos-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-5);
}

.sos-modal {
  background: var(--white);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  width: 100%;
  max-width: 400px;
  position: relative;
  box-shadow: var(--shadow-lg);
}

.sos-close {
  position: absolute;
  top: var(--sp-4);
  right: var(--sp-4);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  color: var(--gray-700);
}
.sos-close:hover { background: var(--gray-200); }

.sos-title {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 20px;
  color: var(--gray-900);
  margin-bottom: var(--sp-4);
  letter-spacing: -0.3px;
  font-style: normal;
  text-transform: none;
}

.sos-btn {
  display: block;
  width: 100%;
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-sm);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  margin-bottom: var(--sp-2);
  transition: opacity 0.15s;
  text-decoration: none;
}
.sos-btn:hover { opacity: 0.9; }

.sos-btn-red { background: var(--rausch); color: var(--white); }
.sos-btn-blue { background: var(--babu); color: var(--white); }
.sos-btn-green { background: var(--forest); color: var(--white); }
.sos-btn-yellow { background: var(--gold); color: var(--gray-900); }
.sos-btn-gray { background: var(--gray-100); color: var(--gray-900); }

/* =============================================
   EMPTY STATES
   ============================================= */

.empty {
  color: var(--gray-500);
  font-size: 14px;
  padding: var(--sp-7) var(--sp-4);
  text-align: center;
  font-family: var(--font-body);
  font-weight: 400;
  font-style: normal;
}

/* =============================================
   EDIT MODE BANNER
   ============================================= */

.edit-mode-banner {
  background: var(--gray-100);
  color: var(--gray-900);
  border: 1px solid var(--gray-300);
  border-radius: var(--r-sm);
  padding: var(--sp-2) var(--sp-3);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  margin-bottom: var(--sp-3);
  text-align: center;
}

/* =============================================
   LEAFLET MAP
   ============================================= */

.leaflet-container {
  background: var(--gray-100) !important;
  border-radius: var(--r-md);
  overflow: hidden;
  min-height: 400px;
  border: 1px solid var(--gray-200);
}

/* =============================================
   TIMELINE (private area)
   ============================================= */

.timeline {
  display: flex;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-4);
  overflow-x: auto;
  scrollbar-width: none;
  margin-bottom: var(--sp-3);
}
.timeline::-webkit-scrollbar { display: none; }

.tl-item {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-sm);
  padding: var(--sp-2) var(--sp-3);
  flex-shrink: 0;
  text-align: left;
  min-width: 80px;
}

.tl-time {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  color: var(--gray-900);
}

.tl-name {
  font-size: 11px;
  color: var(--gray-500);
  margin-top: 2px;
}

/* =============================================
   MOBILE OPTIMIZATIONS
   ============================================= */

@media (max-width: 767px) {
  .hero, .hero-dynamic { padding: var(--sp-5) var(--sp-4) var(--sp-3); }
  .hero h1, .hero-title-mini { font-size: 26px; }
  .tabs { padding: 0 var(--sp-4); gap: var(--sp-5); }
  .dash { padding: var(--sp-4); }
  .private-sub-content { padding: 0 var(--sp-4) var(--sp-6); }
  .sec-nav { padding: var(--sp-3) var(--sp-4); }
  .sub-pills { padding: 0 var(--sp-4) var(--sp-3); }
  .content-area { padding: 0; }
}

/* =============================================
   UTILITY & ANIMATIONS
   ============================================= */

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.dash, .private-sub-content { animation: fadeIn 0.25s ease; }

/* Nasconde vecchie classi non usate */
.card-header { display: none; }



/* =============================================
   HARMONIZATION v17 · MORE AIR, BETTER RHYTHM
   ============================================= */

/* --- Typography scale ricalibrata --- */
body {
  font-size: 15px;
  line-height: 1.5;
  color: var(--gray-900);
}

}

  letter-spacing: 0.3px !important;
}

.hero h1, .hero-title-mini {
  font-size: 38px !important;
  font-weight: 700 !important;
  line-height: 1.1 !important;
  letter-spacing: -1.2px !important;
  margin: 0 0 12px 0 !important;
}

.hero .names, .hero .sub, .hero-sub-mini {
  font-size: 15px !important;
  line-height: 1.5 !important;
  margin: 0 !important;
}

.hero .sub, .hero-sub-mini {
  margin-top: 4px !important;
  color: var(--gray-500);
}

.countdown {
  padding: 20px !important;
  margin-top: 24px !important;
  border-radius: 16px !important;
}

.countdown-units { gap: 32px !important; }
.countdown-num {
  font-size: 32px !important;
  font-weight: 700 !important;
  letter-spacing: -1px !important;
}
.countdown-label {
  font-size: 11px !important;
  margin-top: 6px !important;
  letter-spacing: 0.6px !important;
}

.stats {
  padding: 20px !important;
  margin-top: 16px !important;
  border-radius: 16px !important;
  gap: 20px !important;
}

/* --- TABS: più spaziosi --- */
.tabs {
  padding: 0 32px !important;
  gap: 36px !important;
  border-bottom: 1px solid var(--gray-200);
}

.tab {
  padding: 20px 0 !important;
  font-size: 14px !important;
  font-weight: 500 !important;
  border-bottom-width: 2px !important;
}
.tab.active { font-weight: 600 !important; }

/* --- DASH: molto più padding --- */
.dash {
  padding: 32px !important;
}

.dash-alert {
  padding: 20px !important;
  border-radius: 16px !important;
  margin-bottom: 32px !important;
  gap: 18px !important;
  border-left-width: 4px !important;
}

.dash-alert-lbl {
  font-size: 11px !important;
  letter-spacing: 0.5px !important;
  margin-bottom: 4px !important;
}

.dash-alert-val {
  font-size: 18px !important;
  font-weight: 700 !important;
  line-height: 1.3 !important;
  letter-spacing: -0.3px !important;
}

.dash-alert-desc {
  font-size: 14px !important;
  margin-top: 4px !important;
}

/* Stats grid */
.dash-stats {
  grid-template-columns: 1fr 1fr !important;
  gap: 16px !important;
  margin-bottom: 40px !important;
}

.dash-stat {
  padding: 20px !important;
  border-radius: 16px !important;
}

.dash-stat-num {
  font-size: 28px !important;
  font-weight: 700 !important;
  letter-spacing: -0.8px !important;
  line-height: 1 !important;
}

.dash-stat-lbl {
  font-size: 13px !important;
  margin-top: 8px !important;
  font-weight: 400 !important;
  color: var(--gray-500) !important;
}

.dash-progress { margin-top: 12px !important; height: 4px !important; }

/* --- SECTION TITLES: più visibili --- */
.dash-section-title {
  font-size: 22px !important;
  font-weight: 700 !important;
  letter-spacing: -0.5px !important;
  margin: 40px 0 20px 0 !important;
  padding: 0 !important;
}

/* --- MACRO CARDS: più aria, più grandi --- */
.macro-grid {
  border-radius: 16px !important;
  overflow: hidden !important;
  margin-bottom: 40px !important;
  border: 1px solid var(--gray-200) !important;
}

.macro-card {
  padding: 20px !important;
  gap: 18px !important;
  border-bottom: 1px solid var(--gray-200) !important;
}
.macro-card:last-child { border-bottom: none !important; }

.macro-icon {
  width: 48px !important;
  height: 48px !important;
  border-radius: 12px !important;
  font-size: 22px !important;
}

.macro-name {

}

.macro-sub {
  font-size: 13px !important;
  line-height: 1.5 !important;
  color: var(--gray-500) !important;
}

.macro-highlight {
  color: var(--rausch) !important;
  font-weight: 600 !important;
  font-size: 13px !important;

.macro-card::after {

}

  border-radius: 16px !important;
}

.quick-icon {
  font-size: 24px !important;
  margin-bottom: 10px !important;
}

.quick-lbl {
  font-size: 13px !important;
  font-weight: 500 !important;
}

/* --- SEC NAV --- */
.sec-nav {
  padding: 24px 32px 20px !important;
  grid-template-columns: 80px 1fr 80px !important;
}

.sec-back {
  font-size: 15px !important;
  font-weight: 500 !important;
  padding: 8px 0 !important;
  color: var(--gray-700) !important;
}

.sec-title-txt {
  font-size: 18px !important;
  font-weight: 700 !important;
  letter-spacing: -0.3px !important;
}

/* --- SUB PILLS --- */

// HELPERS
function ring(sz,sw,pct,col){const r=(sz-sw)/2,c=2*Math.PI*r;return'<svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg)"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="'+sw+'"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+(col||'#D8F3DC')+'" stroke-width="'+sw+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+c*(1-pct)+'" stroke-linecap="round" style="transition:stroke-dashoffset .5s"/></svg>'}
function totalDone(){return Object.values(checks).filter(Boolean).length}
function totalStops(){return DAYS.reduce((a,d)=>a+d.stops.length,0)}
function dayProg(di){const d=DAYS[di],n=d.stops.filter((_,si)=>checks[di+"-"+si]).length;return d.stops.length?n/d.stops.length:0}
function isDayDone(di){return dayProg(di)===1}
function timeSince(ts){if(!ts)return"";const s=Math.floor((Date.now()-ts)/1000);if(s<60)return"adesso";if(s<3600)return Math.floor(s/60)+" min fa";if(s<86400)return Math.floor(s/3600)+"h fa";return Math.floor(s/86400)+"g fa"}
function distKm(a,b,c,d){const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function nextStop(){for(let i=0;i<DAYS.length;i++)for(let j=0;j<DAYS[i].stops.length;j++)if(!checks[i+"-"+j])return{...DAYS[i].stops[j],di:i,si:j};return null}
function countdownText(){const now=new Date(),diff=TRIP_START-now;if(diff<=0){if(new Date()>TRIP_END)return null;return{live:true}}const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);return{d,h,m}}
function tripFinished(){return new Date()>TRIP_END}
function isDesktop(){return window.innerWidth>=768}

// RENDER
function getTripPhase(){
const now=new Date();
const start=TRIP_START;
const end=new Date(TRIP_END.getFullYear(),TRIP_END.getMonth(),TRIP_END.getDate()+1);
const diffToStart=Math.ceil((start-now)/86400000);
if(now<start){
if(diffToStart<=1)return{phase:"imminent",tag:"Domani si parte",title:"Abruzzo & Umbria",sub:"Venerd\u00EC 14 agosto \u2014 8 giorni"};
if(diffToStart<=7)return{phase:"imminent",tag:"Fra "+diffToStart+" giorni",title:"Abruzzo & Umbria",sub:"Venerd\u00EC 14 \u2014 Venerd\u00EC 21 agosto"};
return{phase:"pre-trip",tag:"Fra "+diffToStart+" giorni",title:"Abruzzo & Umbria",sub:"Venerd\u00EC 14 \u2014 Venerd\u00EC 21 agosto"};
}
if(now>=start&&now<=end){
const dayIdx=Math.floor((now-start)/86400000);
const currentDay=DAYS[Math.min(dayIdx,DAYS.length-1)];
return{phase:"in-trip",tag:"Giorno "+currentDay.day+" \u00B7 "+currentDay.region,title:currentDay.title,sub:currentDay.date+" \u00B7 "+now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})};
}
return{phase:"post-trip",tag:"Il viaggio \u00E8 finito",title:"Otto giorni indimenticabili",sub:"14 \u2014 21 agosto 2026"};
}

foodPhotoUploading=true;render();
const formData=new FormData();
formData.append('image',file);
fetch('https://api.imgur.com/3/image',{method:'POST',headers:{Authorization:'Client-ID '+IMGUR_CID},body:formData})
.then(r=>r.json())
.then(d=>{
if(d.success&&d.data&&d.data.link){
foodPhotoData=d.data.link;
foodPhotoUploading=false;
render();
}else{
// Fallback: leggi come base64 (funziona ma pesa)
const reader=new FileReader();
reader.onload=ev=>{foodPhotoData=ev.target.result;foodPhotoUploading=false;render()};
reader.readAsDataURL(file);
}
})
.catch(err=>{
console.error('Upload Imgur fallito',err);
// Fallback base64
const reader=new FileReader();
reader.onload=ev=>{foodPhotoData=ev.target.result;foodPhotoUploading=false;render()};
reader.readAsDataURL(file);
});
}

function prepPhoto(f){if(!f)return;pendingFile=f;pendingCaption="";pendingDay=1;for(let i=DAYS.length-1;i>=0;i--)for(let j=DAYS[i].stops.length-1;j>=0;j--)if(checks[i+"-"+j]){pendingDay=DAYS[i].day;i=-1;break}
const r=new FileReader();r.onload=e=>{pendingPreview=e.target.result;render()};r.readAsDataURL(f)}
function cancelPhoto(){pendingFile=null;pendingPreview=null;render()}
async function confirmPhoto(){if(!pendingFile||uploading)return;const c=document.getElementById('photo-caption');if(c)pendingCaption=c.value;uploading=true;render();
try{const rs=await resizeImg(pendingFile,1200);const fd=new FormData();fd.append('image',rs);
const r=await fetch('https://api.imgur.com/3/image',{method:'POST',headers:{'Authorization':'Client-ID '+IMGUR_CID},body:fd});
const d=await r.json();if(d.success){const p={id:'p'+Date.now(),url:d.data.link,thumb:d.data.link.replace(/(\.[a-z]+)$/i,'m$1'),day:pendingDay,caption:pendingCaption.trim(),ts:Date.now()};
if(fbOk)await db.child('photos/'+p.id).set(p);photos.unshift(p)}}catch(e){alert('Errore: '+e.message)}
uploading=false;pendingFile=null;pendingPreview=null;render()}
function resizeImg(f,mx){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const i=new Image();i.onload=()=>{let w=i.width,h=i.height;if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx}else{w=Math.round(w*mx/h);h=mx}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);c.toBlob(r,'image/jpeg',.82)};i.src=e.target.result};rd.readAsDataURL(f)})}
function delPhoto(id){if(!confirm('Eliminare?'))return;if(fbOk)db.child('photos/'+id).remove();photos=photos.filter(p=>p.id!==id);render()}

// Resize listener → re-render per passaggio mobile/desktop

window.addEventListener('resize',()=>{const d=window.innerWidth>=768;if(d!==_lastDesk){_lastDesk=d;render();if(tab==="map")setTimeout(()=>{if(leafletMap)leafletMap.invalidateSize()},300)}});

// INIT
loadAll();if(darkMode)document.body.classList.add("dark");render();initFB();
setInterval(()=>{const cd=countdownText();if(cd&&!cd.live){const el=document.querySelector('.countdown');if(el)render()}},60000);

// Service Worker
if('serviceWorker' in navigator){
const sw=URL.createObjectURL(new Blob([`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>{
const url=e.request.url;
if(url.includes('api.open-meteo')||url.includes('api.imgur')||url.includes('firebase'))return;
if(url.includes('tile.openstreetmap')||url.includes('cartocdn')||url.includes('cdnjs')||url.includes('googleapis')){
e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
if(res&&res.status===200){const c=res.clone();caches.open('map-cache-v1').then(cache=>cache.put(e.request,c))}return res}).catch(()=>caches.match(e.request))));
return;
}
e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
if(res.ok){const c=res.clone();caches.open('trip-v2').then(cache=>cache.put(e.request,c))}return res}).catch(()=>caches.match(e.request))))});
`],{type:'application/javascript'}));
navigator.serviceWorker.register(sw).catch(()=>{});}
